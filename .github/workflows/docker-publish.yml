name: Build and Publish Docker Image

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'Dockerfile'      # Rebuilds automatically if you change the Dockerfile
      - 'filter.vpy'      # Rebuilds if you change the VapourSynth script
  workflow_dispatch:      # Allows you to trigger the build manually

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/anime-encoder

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    
    # Give the workflow permission to upload to your GitHub Packages
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Sets up Docker Buildx for faster caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          # Use GitHub Actions cache to speed up future builds (compiling takes time!)
          cache-from: type=gha
          cache-to: type=gha,mode=max
