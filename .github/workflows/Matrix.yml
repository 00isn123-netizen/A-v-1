name: Matrix AV1 Encoder
on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Direct Link to Video (MKV/MP4)'
        required: true
      crf:
        description: 'CRF value (lower = better quality, 23–55)'
        default: '50'
      preset:
        description: 'SVT-AV1 preset (0=slowest/best, 13=fastest)'
        default: '4'
      output_name:
        description: 'Output filename (without extension)'
        default: 'encoded'
      chunk_count:
        description: 'Number of chunks to split into (more = more parallelism)'
        default: '10'

permissions:
  actions: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  split-video:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      matrix_json: ${{ steps.set-matrix.outputs.matrix_json }}
      chunk_count: ${{ steps.set-matrix.outputs.chunk_count }}
    steps:
      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-jellyfin-ffmpeg7-${{ runner.os }}

      - name: Install ffmpeg
        run: |
          curl -fsSL https://repo.jellyfin.org/jellyfin_team.gpg.key \
            | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/jellyfin.gpg
          echo "deb [arch=amd64] https://repo.jellyfin.org/ubuntu noble main" \
            | sudo tee /etc/apt/sources.list.d/jellyfin.list
          sudo apt-get update
          sudo apt-get install -y jellyfin-ffmpeg7
          echo "/usr/lib/jellyfin-ffmpeg" >> $GITHUB_PATH

      - name: Verify ffmpeg + svtav1
        run: ffmpeg -encoders 2>/dev/null | grep svtav1

      - name: Download
        run: |
          curl --fail --retry 3 --location --globoff \
            --output source.mkv \
            --progress-bar \
            "$VIDEO_URL"

          SIZE=$(stat -c%s source.mkv)
          echo "Downloaded: ${SIZE} bytes"
          if [ "$SIZE" -lt 1000000 ]; then
            echo "ERROR: File too small, download likely failed"
            exit 1
          fi

          MAGIC=$(xxd -p -l 4 source.mkv)
          echo "File magic: $MAGIC"
          if [ "$MAGIC" != "1a45dfa3" ]; then
            echo "WARNING: File does not appear to be MKV, may be HTML error page"
            head -c 500 source.mkv
            exit 1
          fi
        env:
          VIDEO_URL: ${{ github.event.inputs.video_url }}

      - name: Slice (${{ github.event.inputs.chunk_count }} chunks, keyframe-aligned)
        run: |
          DURATION=$(ffprobe -v error \
            -analyzeduration 100M -probesize 100M \
            -show_entries format=duration \
            -of default=noprint_wrappers=1:nokey=1 \
            source.mkv)

          CHUNK_COUNT=${{ github.event.inputs.chunk_count }}
          CHUNK=$(awk "BEGIN {printf \"%d\", $DURATION / $CHUNK_COUNT}")
          echo "Video duration: ${DURATION}s — ${CHUNK_COUNT} chunks of ~${CHUNK}s"

          # Map only text-based subs, skip bitmap formats (PGS, DVDSUB)
          SUB_MAPS=""
          STREAM_IDX=0
          while IFS= read -r CODEC; do
            if [[ "$CODEC" != "hdmv_pgs_subtitle" && "$CODEC" != "dvd_subtitle" ]]; then
              SUB_MAPS="$SUB_MAPS -map 0:s:$STREAM_IDX"
            fi
            STREAM_IDX=$((STREAM_IDX + 1))
          done < <(ffprobe -v error -select_streams s \
            -show_entries stream=codec_name \
            -of csv=p=0 source.mkv 2>/dev/null || true)
          echo "Subtitle maps: ${SUB_MAPS:-none}"

          ffmpeg \
            -analyzeduration 100M -probesize 100M \
            -i source.mkv \
            -map 0:v -map 0:a $SUB_MAPS \
            -c:v copy \
            -c:a copy \
            -c:s copy \
            -segment_time "$CHUNK" \
            -segment_time_delta 0.05 \
            -f segment \
            -segment_format matroska \
            "part_%02d.mkv"

          echo "Chunks created:"
          ls -lh part_*.mkv

      - id: set-matrix
        run: |
          FILES=$(ls part_*.mkv | jq -R -s -c 'split("\n")[:-1]')
          COUNT=$(ls part_*.mkv | wc -l)
          echo "matrix_json=$FILES" >> $GITHUB_OUTPUT
          echo "chunk_count=$COUNT" >> $GITHUB_OUTPUT

      - name: Upload Chunks
        uses: actions/upload-artifact@v4
        with:
          name: raw-chunks
          path: part_*.mkv
          retention-days: 1

  encode-parts:
    needs: split-video
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        part: ${{ fromJson(needs.split-video.outputs.matrix_json) }}
    steps:
      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-jellyfin-ffmpeg7-${{ runner.os }}

      - name: Install ffmpeg
        run: |
          curl -fsSL https://repo.jellyfin.org/jellyfin_team.gpg.key \
            | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/jellyfin.gpg
          echo "deb [arch=amd64] https://repo.jellyfin.org/ubuntu noble main" \
            | sudo tee /etc/apt/sources.list.d/jellyfin.list
          sudo apt-get update
          sudo apt-get install -y jellyfin-ffmpeg7
          echo "/usr/lib/jellyfin-ffmpeg" >> $GITHUB_PATH

      - name: Verify ffmpeg + svtav1
        run: ffmpeg -encoders 2>/dev/null | grep svtav1

      - name: Download Chunk
        uses: actions/download-artifact@v4
        with:
          name: raw-chunks

      - name: Write progress helper
        shell: python
        run: |
          script = r"""
          import os, sys, json, time, urllib.request

          cache_url = os.environ['ACTIONS_CACHE_URL']
          token     = os.environ['ACTIONS_RUNTIME_TOKEN']
          run_id    = os.environ['GITHUB_RUN_ID']
          payload   = sys.argv[1]
          part_id   = sys.argv[2]

          # Stable prefix per chunk per run — used for delete + prefix-read
          prefix  = f"enc-prog-{run_id}-{part_id}"
          key     = f"{prefix}-{int(time.time())}"
          content = payload.encode()

          hdrs = {
              'Authorization': f'Bearer {token}',
              'Content-Type':  'application/json',
              'Accept':        'application/json;api-version=6.0-preview.1',
          }

          try:
              # 0. Delete all previous entries for this chunk to avoid pile-up
              del_hdrs = {k: v for k, v in hdrs.items() if k != 'Content-Type'}
              req = urllib.request.Request(
                  f"{cache_url}_apis/artifactcache/caches?key={prefix}",
                  headers=del_hdrs, method='DELETE')
              try:
                  urllib.request.urlopen(req, timeout=10)
              except Exception:
                  pass  # 404 = no prior entries yet, fine

              # 1. Reserve a new cache slot
              req = urllib.request.Request(
                  f"{cache_url}_apis/artifactcache/caches",
                  data=json.dumps({"key": key, "version": run_id}).encode(),
                  headers=hdrs, method='POST')
              with urllib.request.urlopen(req, timeout=10) as r:
                  cache_id = json.load(r)['cacheId']

              # 2. Upload payload bytes
              up_hdrs = {**hdrs,
                         'Content-Type':  'application/octet-stream',
                         'Content-Range': f'bytes 0-{len(content)-1}/*'}
              req = urllib.request.Request(
                  f"{cache_url}_apis/artifactcache/caches/{cache_id}",
                  data=content, headers=up_hdrs, method='PATCH')
              urllib.request.urlopen(req, timeout=10)

              # 3. Commit
              req = urllib.request.Request(
                  f"{cache_url}_apis/artifactcache/caches/{cache_id}",
                  data=json.dumps({"size": len(content)}).encode(),
                  headers=hdrs, method='POST')
              urllib.request.urlopen(req, timeout=10)

          except Exception as e:
              print(f"[progress] push failed: {e}", file=sys.stderr)
          """
          import textwrap, pathlib
          pathlib.Path("/tmp/push_progress.py").write_text(textwrap.dedent(script).lstrip())

      - name: Encode
        run: |
          PART="${{ matrix.part }}"
          PART_ID="${PART%.mkv}"
          OUTNAME="${PART_ID}-encoded.mkv"
          START_TIME=$(date +%s)

          # Map only text-based subs, skip bitmap formats (PGS, DVDSUB)
          SUB_MAPS=""
          STREAM_IDX=0
          while IFS= read -r CODEC; do
            if [[ "$CODEC" != "hdmv_pgs_subtitle" && "$CODEC" != "dvd_subtitle" ]]; then
              SUB_MAPS="$SUB_MAPS -map 0:s:$STREAM_IDX"
            fi
            STREAM_IDX=$((STREAM_IDX + 1))
          done < <(ffprobe -v error -select_streams s \
            -show_entries stream=codec_name \
            -of csv=p=0 "$PART" 2>/dev/null || true)

          # Get total frames for accurate progress %
          TOTAL_FRAMES=$(ffprobe -v error -select_streams v:0 \
            -show_entries stream=nb_frames \
            -of csv=p=0 "$PART" 2>/dev/null | head -1 || echo 0)
          [[ -z "$TOTAL_FRAMES" || "$TOTAL_FRAMES" == "N/A" ]] && TOTAL_FRAMES=0
          echo "Total frames: $TOTAL_FRAMES"

          # Run ffmpeg in the background so we can log progress to the job log
          ffmpeg \
            -progress /tmp/ff_prog.txt -nostats \
            -analyzeduration 100M -probesize 100M \
            -i "$PART" \
            -map 0:v -map 0:a $SUB_MAPS \
            -c:v libsvtav1 \
            -preset ${{ github.event.inputs.preset }} \
            -crf ${{ github.event.inputs.crf }} \
            -svtav1-params tune=2:enable-overlays=1:tile-columns=1 \
            -c:a libopus -b:a 64k \
            -c:s copy \
            -threads $(nproc) \
            "$OUTNAME" &
          FFMPEG_PID=$!

          # Log a progress snapshot to the job log every 20s
          while kill -0 $FFMPEG_PID 2>/dev/null; do
            sleep 20
            [ ! -f /tmp/ff_prog.txt ] && continue

            FRAME=$(grep  "^frame="      /tmp/ff_prog.txt | tail -1 | cut -d= -f2 | tr -d ' ')
            FPS=$(grep    "^fps="        /tmp/ff_prog.txt | tail -1 | cut -d= -f2 | tr -d ' ')
            SPEED=$(grep  "^speed="      /tmp/ff_prog.txt | tail -1 | cut -d= -f2 | tr -d ' x')
            SIZE=$(grep   "^total_size=" /tmp/ff_prog.txt | tail -1 | cut -d= -f2 | tr -d ' ')
            ELAPSED=$(($(date +%s) - START_TIME))

            FRAME=${FRAME:-0}; FPS=${FPS:-0}; SPEED=${SPEED:-0}; SIZE=${SIZE:-0}

            if [ "$TOTAL_FRAMES" -gt 0 ] && [ "$FRAME" -gt 0 ]; then
              PROGRESS=$(awk "BEGIN {printf \"%.1f\", ($FRAME/$TOTAL_FRAMES)*100}")
              ETA=$(awk "BEGIN {fps=$FPS; rem=$TOTAL_FRAMES-$FRAME; print (fps>0)?int(rem/fps):0}")
            else
              PROGRESS="0.0"; ETA=0
            fi

            python3 /tmp/push_progress.py \
              "{\"chunk\":\"$PART_ID\",\"progress\":$PROGRESS,\"speed\":$SPEED,\"fps\":$FPS,\"eta_seconds\":$ETA,\"size_bytes\":$SIZE,\"elapsed_seconds\":$ELAPSED,\"total_frames\":$TOTAL_FRAMES,\"current_frame\":$FRAME,\"finished\":false}" \
              "$PART_ID"
          done

          wait $FFMPEG_PID
          EXIT_CODE=$?
          [ $EXIT_CODE -ne 0 ] && { echo "FFmpeg failed (exit $EXIT_CODE)"; exit $EXIT_CODE; }

          # Push final snapshot
          ELAPSED=$(($(date +%s) - START_TIME))
          FINAL_SIZE=$(stat -c%s "$OUTNAME" 2>/dev/null || echo 0)
          python3 /tmp/push_progress.py \
            "{\"chunk\":\"$PART_ID\",\"progress\":100.0,\"speed\":0,\"fps\":0,\"eta_seconds\":0,\"size_bytes\":$FINAL_SIZE,\"elapsed_seconds\":$ELAPSED,\"total_frames\":$TOTAL_FRAMES,\"current_frame\":$TOTAL_FRAMES,\"finished\":true}" \
            "$PART_ID"

      # FIX: Artifact names cannot contain dots — strip the .mkv extension first.
      - name: Set safe artifact name
        id: art
        run: |
          SAFE="${{ matrix.part }}"
          SAFE="${SAFE%.mkv}"
          echo "name=encoded-${SAFE}" >> $GITHUB_OUTPUT

      - name: Upload Encoded
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.art.outputs.name }}
          path: "*-encoded.mkv"
          retention-days: 1

  # Runs in parallel with encode-parts.
  # Reads live ffmpeg progress from the Actions cache service (written by each
  # encode job every 20s) and prints a rich combined view every 30s.
  # Each chunk always has exactly 1 cache entry — push_progress.py deletes the
  # previous entry before writing a new one, so nothing piles up.
  monitor:
    needs: split-video
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Watch encode progress
        shell: python
        env:
          CHUNKS:  ${{ needs.split-video.outputs.matrix_json }}
          RUN_ID:  ${{ github.run_id }}
        run: |
          import os, json, time, urllib.request
          from datetime import timedelta

          # ACTIONS_CACHE_URL and ACTIONS_RUNTIME_TOKEN are injected by the
          # runner for every job — no need to pass them manually.
          cache_url = os.environ['ACTIONS_CACHE_URL']
          token     = os.environ['ACTIONS_RUNTIME_TOKEN']
          run_id    = os.environ['RUN_ID']
          chunks    = json.loads(os.environ['CHUNKS'])
          parts     = [c.replace('.mkv', '') for c in chunks]
          total     = len(parts)

          HDRS = {
              'Authorization': f'Bearer {token}',
              'Accept':        'application/json;api-version=6.0-preview.1',
          }

          def fetch(part_id):
              """Read the latest progress entry for a chunk from the cache."""
              prefix = f"enc-prog-{run_id}-{part_id}"
              url    = (f"{cache_url}_apis/artifactcache/cache"
                        f"?keys={prefix}&version={run_id}")
              try:
                  req = urllib.request.Request(url, headers=HDRS)
                  with urllib.request.urlopen(req, timeout=10) as r:
                      result = json.load(r)
                  loc = result.get('archiveLocation')
                  if not loc:
                      return None
                  with urllib.request.urlopen(loc, timeout=10) as r:
                      return json.loads(r.read().decode())
              except Exception:
                  return None

          def bar(pct, w=20):
              f = int(pct / 100 * w)
              return '▰' * f + '▱' * (w - f)

          def hms(s):
              return str(timedelta(seconds=max(0, int(s))))

          def fmt_size(b):
              b = int(b)
              if b >= 1_073_741_824: return f"{b/1_073_741_824:.2f} GB"
              if b >= 1_048_576:     return f"{b/1_048_576:.1f} MB"
              return f"{b/1024:.1f} KB"

          W     = 68
          start = time.time()
          last  = {}

          while True:
              for part in parts:
                  d = fetch(part)
                  if d:
                      last[part] = d

              elapsed  = time.time() - start
              done     = [s for s in last.values() if s.get('finished')]
              active   = [s for s in last.values() if not s.get('finished')]
              waiting  = total - len(last)
              n_done   = len(done)

              # ── summary stats ──────────────────────────────────────────────
              all_rep   = list(last.values())
              avg_pct   = sum(s.get('progress', 0) for s in all_rep) / total if total else 0
              tot_fps   = sum(s.get('fps',   0) for s in active)
              tot_speed = sum(s.get('speed', 0) for s in active)
              avg_eta   = (sum(s.get('eta_seconds', 0) for s in active)
                           / len(active)) if active else 0

              # Estimate total output size from completed chunks
              done_sizes  = [s.get('size_bytes', 0) for s in done if s.get('size_bytes', 0) > 0]
              avg_chunk   = (sum(done_sizes) / len(done_sizes)) if done_sizes else 0
              est_total   = avg_chunk * total if avg_chunk else 0
              actual_done = sum(done_sizes)

              print('═' * W)
              print(f"  📊 MATRIX AV1 ENCODE  ·  run #{run_id}  ·  {hms(elapsed)} elapsed")
              print('═' * W)
              print(f"  Progress : {bar(avg_pct)}  {avg_pct:.1f}%   "
                    f"({n_done}/{total} done"
                    + (f" · {len(active)} active" if active else "")
                    + (f" · {waiting} waiting" if waiting else "") + ")")
              if active:
                  print(f"  Speed    : {tot_speed:.2f}x total  ·  {tot_fps:.0f} fps total")
                  print(f"  ETA      : ~{hms(avg_eta)} remaining (avg across active)")
              if est_total:
                  print(f"  Size out : ~{fmt_size(est_total)} est. total  "
                        f"({fmt_size(actual_done)} written so far)")
              print('─' * W)
              print(f"  {'#':<5} {'status':<9} {'elapsed':<10} "
                    f"{'progress':<24} {'speed':<8} {'fps':<7} {'ETA':<10} {'size'}")
              print('  ' + '─' * (W - 2))

              for i, part in enumerate(parts):
                  s   = last.get(part)
                  idx = f"[{i:02d}]"
                  if s is None:
                      print(f"  {idx}  {'⏳ waiting':<9}")
                      continue

                  el   = hms(s.get('elapsed_seconds', 0))
                  sz   = fmt_size(s.get('size_bytes', 0)) if s.get('size_bytes', 0) else '—'

                  if s.get('finished'):
                      print(f"  {idx}  {'✅ done':<9} {el:<10} "
                            f"{'▰'*20:<24} {'—':<8} {'—':<7} {'—':<10} {sz}")
                  else:
                      pct  = s.get('progress', 0)
                      spd  = s.get('speed',    0)
                      fps  = s.get('fps',      0)
                      eta  = hms(s.get('eta_seconds', 0))
                      b    = bar(pct)
                      print(f"  {idx}  {'🔄 enc':<9} {el:<10} "
                            f"{b+f' {pct:4.1f}%':<24} {spd:<8.2f} {fps:<7.0f} {eta:<10} {sz}")

              print('═' * W, flush=True)

              if n_done == total and total > 0:
                  total_size = sum(s.get('size_bytes', 0) for s in done)
                  print(f"\n✅ All {total} chunks finished.  "
                        f"Total output size: {fmt_size(total_size)}")
                  break

              time.sleep(30)

  merge-video:
    needs: [split-video, encode-parts]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-jellyfin-ffmpeg7-${{ runner.os }}

      - name: Install ffmpeg
        run: |
          curl -fsSL https://repo.jellyfin.org/jellyfin_team.gpg.key \
            | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/jellyfin.gpg
          echo "deb [arch=amd64] https://repo.jellyfin.org/ubuntu noble main" \
            | sudo tee /etc/apt/sources.list.d/jellyfin.list
          sudo apt-get update
          sudo apt-get install -y jellyfin-ffmpeg7
          echo "/usr/lib/jellyfin-ffmpeg" >> $GITHUB_PATH

      - name: Verify ffmpeg
        run: ffmpeg -version

      - name: Download All
        uses: actions/download-artifact@v4
        with:
          path: encoded-parts
          pattern: encoded-*
          merge-multiple: true

      - name: Verify chunk count
        run: |
          EXPECTED="${{ needs.split-video.outputs.chunk_count }}"
          ACTUAL=$(find encoded-parts -name "*-encoded.mkv" | wc -l)
          echo "Expected ${EXPECTED} chunks, found ${ACTUAL}"
          if [ "$ACTUAL" -ne "$EXPECTED" ]; then
            echo "ERROR: Chunk count mismatch — one or more encode jobs likely failed"
            exit 1
          fi

      - name: Merge
        run: |
          find encoded-parts -name "*-encoded.mkv" | sort | \
            sed "s/^/file '/;s/$/'/" > list.txt
          cat list.txt
          OUTPUT_NAME="${{ github.event.inputs.output_name }}"
          ffmpeg -f concat -safe 0 -i list.txt -c copy "${OUTPUT_NAME}.mkv"

      - name: Summary
        run: |
          OUTPUT_NAME="${{ github.event.inputs.output_name }}"
          FINAL=$(stat -c%s "${OUTPUT_NAME}.mkv")
          echo "### ✅ Encode Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Output:** \`${OUTPUT_NAME}.mkv\`" >> $GITHUB_STEP_SUMMARY
          echo "- **CRF:** ${{ github.event.inputs.crf }} | **Preset:** ${{ github.event.inputs.preset }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Output size:** $(numfmt --to=iec $FINAL)" >> $GITHUB_STEP_SUMMARY
          echo "- **Chunks merged:** ${{ needs.split-video.outputs.chunk_count }}" >> $GITHUB_STEP_SUMMARY

      - name: Final Upload
        uses: actions/upload-artifact@v4
        with:
          name: final-result
          path: "${{ github.event.inputs.output_name }}.mkv"

  cleanup:
    needs: merge-video
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Delete intermediate artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts \
            --paginate --jq '.artifacts[] | select(.name != "final-result") | .id' | \
            xargs -I{} gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/{}
          echo "Intermediate artifacts deleted."
