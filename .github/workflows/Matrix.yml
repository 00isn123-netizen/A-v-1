name: Matrix AV1 Encoder
on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Direct Link to Video (MKV/MP4)'
        required: true
      crf:
        description: 'CRF value (lower = better quality, 23–55)'
        default: '50'
      preset:
        description: 'SVT-AV1 preset (0=slowest/best, 13=fastest)'
        default: '4'
      output_name:
        description: 'Output filename (without extension)'
        default: 'encoded'
      chunk_count:
        description: 'Number of chunks to split into (more = more parallelism)'
        default: '10'

permissions:
  actions: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  split-video:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      matrix_json: ${{ steps.set-matrix.outputs.matrix_json }}
      chunk_count: ${{ steps.set-matrix.outputs.chunk_count }}
    steps:
      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-jellyfin-ffmpeg7-${{ runner.os }}

      - name: Install ffmpeg
        run: |
          curl -fsSL https://repo.jellyfin.org/jellyfin_team.gpg.key \
            | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/jellyfin.gpg
          echo "deb [arch=amd64] https://repo.jellyfin.org/ubuntu noble main" \
            | sudo tee /etc/apt/sources.list.d/jellyfin.list
          sudo apt-get update
          sudo apt-get install -y jellyfin-ffmpeg7
          echo "/usr/lib/jellyfin-ffmpeg" >> $GITHUB_PATH

      - name: Verify ffmpeg + svtav1
        run: ffmpeg -encoders 2>/dev/null | grep svtav1

      - name: Download
        run: |
          curl --fail --retry 3 --location --globoff \
            --output source.mkv \
            --progress-bar \
            "$VIDEO_URL"

          SIZE=$(stat -c%s source.mkv)
          echo "Downloaded: ${SIZE} bytes"
          if [ "$SIZE" -lt 1000000 ]; then
            echo "ERROR: File too small, download likely failed"
            exit 1
          fi

          MAGIC=$(xxd -p -l 4 source.mkv)
          echo "File magic: $MAGIC"
          if [ "$MAGIC" != "1a45dfa3" ]; then
            echo "WARNING: File does not appear to be MKV, may be HTML error page"
            head -c 500 source.mkv
            exit 1
          fi
        env:
          VIDEO_URL: ${{ github.event.inputs.video_url }}

      - name: Slice (${{ github.event.inputs.chunk_count }} chunks, keyframe-aligned)
        run: |
          DURATION=$(ffprobe -v error \
            -analyzeduration 100M -probesize 100M \
            -show_entries format=duration \
            -of default=noprint_wrappers=1:nokey=1 \
            source.mkv)

          CHUNK_COUNT=${{ github.event.inputs.chunk_count }}
          CHUNK=$(awk "BEGIN {printf \"%d\", $DURATION / $CHUNK_COUNT}")
          echo "Video duration: ${DURATION}s — ${CHUNK_COUNT} chunks of ~${CHUNK}s"

          # Map only text-based subs, skip bitmap formats (PGS, DVDSUB)
          SUB_MAPS=""
          STREAM_IDX=0
          while IFS= read -r CODEC; do
            if [[ "$CODEC" != "hdmv_pgs_subtitle" && "$CODEC" != "dvd_subtitle" ]]; then
              SUB_MAPS="$SUB_MAPS -map 0:s:$STREAM_IDX"
            fi
            STREAM_IDX=$((STREAM_IDX + 1))
          done < <(ffprobe -v error -select_streams s \
            -show_entries stream=codec_name \
            -of csv=p=0 source.mkv 2>/dev/null || true)
          echo "Subtitle maps: ${SUB_MAPS:-none}"

          ffmpeg \
            -analyzeduration 100M -probesize 100M \
            -i source.mkv \
            -map 0:v -map 0:a $SUB_MAPS \
            -c:v copy \
            -c:a copy \
            -c:s copy \
            -segment_time "$CHUNK" \
            -segment_time_delta 0.05 \
            -f segment \
            -segment_format matroska \
            "part_%02d.mkv"

          echo "Chunks created:"
          ls -lh part_*.mkv

      - id: set-matrix
        run: |
          FILES=$(ls part_*.mkv | jq -R -s -c 'split("\n")[:-1]')
          COUNT=$(ls part_*.mkv | wc -l)
          echo "matrix_json=$FILES" >> $GITHUB_OUTPUT
          echo "chunk_count=$COUNT" >> $GITHUB_OUTPUT

      - name: Upload Chunks
        uses: actions/upload-artifact@v4
        with:
          name: raw-chunks
          path: part_*.mkv
          retention-days: 1

  encode-parts:
    needs: split-video
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        part: ${{ fromJson(needs.split-video.outputs.matrix_json) }}
    steps:
      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-jellyfin-ffmpeg7-${{ runner.os }}

      - name: Install ffmpeg
        run: |
          curl -fsSL https://repo.jellyfin.org/jellyfin_team.gpg.key \
            | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/jellyfin.gpg
          echo "deb [arch=amd64] https://repo.jellyfin.org/ubuntu noble main" \
            | sudo tee /etc/apt/sources.list.d/jellyfin.list
          sudo apt-get update
          sudo apt-get install -y jellyfin-ffmpeg7
          echo "/usr/lib/jellyfin-ffmpeg" >> $GITHUB_PATH

      - name: Verify ffmpeg + svtav1
        run: ffmpeg -encoders 2>/dev/null | grep svtav1

      - name: Download Chunk
        uses: actions/download-artifact@v4
        with:
          name: raw-chunks

      - name: Write progress helper
        shell: python
        run: |
          script = r"""
          # Lightweight progress logger — writes a JSON line to stdout so it
          # appears in the job log. No cross-job IPC; the monitor job uses the
          # GitHub REST API to track overall completion instead.
          import sys, json
          payload  = sys.argv[1]
          part_id  = sys.argv[2]
          try:
              data = json.loads(payload)
              pct  = data.get('progress', 0)
              spd  = data.get('speed', 0)
              eta  = data.get('eta_seconds', 0)
              done = data.get('finished', False)
              if done:
                  mb = data.get('size_bytes', 0) / 1_048_576
                  print(f"[{part_id}] ✅ done — {mb:.1f} MB", flush=True)
              else:
                  bar = '▰' * int(pct / 100 * 20) + '▱' * (20 - int(pct / 100 * 20))
                  print(f"[{part_id}] {bar} {pct:5.1f}%  {spd:.2f}x  ETA {int(eta)}s", flush=True)
          except Exception as e:
              print(f"[progress] push failed: {e}", file=sys.stderr)
          """
          # Strip leading indentation so the file is valid Python
          import textwrap, pathlib
          pathlib.Path("/tmp/push_progress.py").write_text(textwrap.dedent(script).lstrip())

      - name: Encode
        run: |
          PART="${{ matrix.part }}"
          PART_ID="${PART%.mkv}"
          OUTNAME="${PART_ID}-encoded.mkv"
          START_TIME=$(date +%s)

          # Map only text-based subs, skip bitmap formats (PGS, DVDSUB)
          SUB_MAPS=""
          STREAM_IDX=0
          while IFS= read -r CODEC; do
            if [[ "$CODEC" != "hdmv_pgs_subtitle" && "$CODEC" != "dvd_subtitle" ]]; then
              SUB_MAPS="$SUB_MAPS -map 0:s:$STREAM_IDX"
            fi
            STREAM_IDX=$((STREAM_IDX + 1))
          done < <(ffprobe -v error -select_streams s \
            -show_entries stream=codec_name \
            -of csv=p=0 "$PART" 2>/dev/null || true)

          # Get total frames for accurate progress %
          TOTAL_FRAMES=$(ffprobe -v error -select_streams v:0 \
            -show_entries stream=nb_frames \
            -of csv=p=0 "$PART" 2>/dev/null | head -1 || echo 0)
          [[ -z "$TOTAL_FRAMES" || "$TOTAL_FRAMES" == "N/A" ]] && TOTAL_FRAMES=0
          echo "Total frames: $TOTAL_FRAMES"

          # Run ffmpeg in the background so we can log progress to the job log
          ffmpeg \
            -progress /tmp/ff_prog.txt -nostats \
            -analyzeduration 100M -probesize 100M \
            -i "$PART" \
            -map 0:v -map 0:a $SUB_MAPS \
            -c:v libsvtav1 \
            -preset ${{ github.event.inputs.preset }} \
            -crf ${{ github.event.inputs.crf }} \
            -svtav1-params tune=2:enable-overlays=1:tile-columns=1 \
            -c:a libopus -b:a 64k \
            -c:s copy \
            -threads $(nproc) \
            "$OUTNAME" &
          FFMPEG_PID=$!

          # Log a progress snapshot to the job log every 20s
          while kill -0 $FFMPEG_PID 2>/dev/null; do
            sleep 20
            [ ! -f /tmp/ff_prog.txt ] && continue

            FRAME=$(grep  "^frame="      /tmp/ff_prog.txt | tail -1 | cut -d= -f2 | tr -d ' ')
            FPS=$(grep    "^fps="        /tmp/ff_prog.txt | tail -1 | cut -d= -f2 | tr -d ' ')
            SPEED=$(grep  "^speed="      /tmp/ff_prog.txt | tail -1 | cut -d= -f2 | tr -d ' x')
            SIZE=$(grep   "^total_size=" /tmp/ff_prog.txt | tail -1 | cut -d= -f2 | tr -d ' ')
            ELAPSED=$(($(date +%s) - START_TIME))

            FRAME=${FRAME:-0}; FPS=${FPS:-0}; SPEED=${SPEED:-0}; SIZE=${SIZE:-0}

            if [ "$TOTAL_FRAMES" -gt 0 ] && [ "$FRAME" -gt 0 ]; then
              PROGRESS=$(awk "BEGIN {printf \"%.1f\", ($FRAME/$TOTAL_FRAMES)*100}")
              ETA=$(awk "BEGIN {fps=$FPS; rem=$TOTAL_FRAMES-$FRAME; print (fps>0)?int(rem/fps):0}")
            else
              PROGRESS="0.0"; ETA=0
            fi

            python3 /tmp/push_progress.py \
              "{\"chunk\":\"$PART_ID\",\"progress\":$PROGRESS,\"speed\":$SPEED,\"eta_seconds\":$ETA,\"size_bytes\":$SIZE,\"elapsed_seconds\":$ELAPSED,\"total_frames\":$TOTAL_FRAMES,\"current_frame\":$FRAME,\"finished\":false}" \
              "$PART_ID"
          done

          wait $FFMPEG_PID
          EXIT_CODE=$?
          [ $EXIT_CODE -ne 0 ] && { echo "FFmpeg failed (exit $EXIT_CODE)"; exit $EXIT_CODE; }

          # Log final snapshot
          ELAPSED=$(($(date +%s) - START_TIME))
          FINAL_SIZE=$(stat -c%s "$OUTNAME" 2>/dev/null || echo 0)
          python3 /tmp/push_progress.py \
            "{\"chunk\":\"$PART_ID\",\"progress\":100.0,\"speed\":0,\"eta_seconds\":0,\"size_bytes\":$FINAL_SIZE,\"elapsed_seconds\":$ELAPSED,\"total_frames\":$TOTAL_FRAMES,\"current_frame\":$TOTAL_FRAMES,\"finished\":true}" \
            "$PART_ID"

      # FIX: Artifact names cannot contain dots — strip the .mkv extension first.
      - name: Set safe artifact name
        id: art
        run: |
          SAFE="${{ matrix.part }}"
          SAFE="${SAFE%.mkv}"
          echo "name=encoded-${SAFE}" >> $GITHUB_OUTPUT

      - name: Upload Encoded
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.art.outputs.name }}
          path: "*-encoded.mkv"
          retention-days: 1

  # Runs in parallel with encode-parts — no dependency on it.
  # Polls the GitHub REST API every 30s to report per-chunk job status.
  # This replaces the previous cache-service IPC approach, which required
  # ACTIONS_CACHE_URL — a runner-internal variable not reliably available
  # across separate jobs.
  monitor:
    needs: split-video
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Watch encode progress
        shell: python
        env:
          CHUNKS:     ${{ needs.split-video.outputs.matrix_json }}
          RUN_ID:     ${{ github.run_id }}
          REPO:       ${{ github.repository }}
          GH_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
        run: |
          import os, json, time, urllib.request, urllib.error
          from datetime import timedelta

          gh_token = os.environ['GH_TOKEN']
          run_id   = os.environ['RUN_ID']
          repo     = os.environ['REPO']
          chunks   = json.loads(os.environ['CHUNKS'])
          parts    = [c.replace('.mkv', '') for c in chunks]
          total    = len(parts)

          API = "https://api.github.com"
          HDRS = {
              'Authorization':        f'Bearer {gh_token}',
              'Accept':               'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
          }

          def gh_get(url):
              req = urllib.request.Request(url, headers=HDRS)
              try:
                  with urllib.request.urlopen(req, timeout=15) as r:
                      return json.load(r)
              except urllib.error.HTTPError as e:
                  print(f"[monitor] HTTP {e.code} — {url}", flush=True)
                  return None
              except Exception as e:
                  print(f"[monitor] request error — {e}", flush=True)
                  return None

          def get_encode_jobs():
              """
              Fetch all jobs for this run (paginated) and return only the
              encode-parts matrix jobs, keyed by their matrix part name.
              Job names look like: 'encode-parts (part_00.mkv)'
              """
              jobs = {}
              url  = f"{API}/repos/{repo}/actions/runs/{run_id}/jobs?per_page=100"
              while url:
                  data = gh_get(url)
                  if not data:
                      break
                  for j in data.get('jobs', []):
                      name = j.get('name', '')
                      if name.startswith('encode-parts (') and name.endswith(')'):
                          part_file = name[len('encode-parts ('):-1]   # e.g. 'part_00.mkv'
                          part_id   = part_file.replace('.mkv', '')     # e.g. 'part_00'
                          jobs[part_id] = j
                  # Follow Link: <url>; rel="next" header if present
                  url = None  # urllib doesn't expose headers easily; single page is usually enough
              return jobs

          def bar(pct, w=20):
              f = int(pct / 100 * w)
              return '▰' * f + '▱' * (w - f)

          def hms(s):
              return str(timedelta(seconds=max(0, int(s))))

          def job_duration(j):
              """Return elapsed seconds for a job, or 0 if not started."""
              import datetime
              started = j.get('started_at')
              if not started:
                  return 0
              fmt = '%Y-%m-%dT%H:%M:%SZ'
              start_dt = datetime.datetime.strptime(started, fmt)
              completed = j.get('completed_at')
              if completed:
                  end_dt = datetime.datetime.strptime(completed, fmt)
              else:
                  end_dt = datetime.datetime.utcnow()
              return max(0, int((end_dt - start_dt).total_seconds()))

          # Status → display values
          STATUS_ICON = {
              'queued':      '⏳',
              'in_progress': '🔄',
              'completed':   None,   # use conclusion instead
          }
          CONCLUSION_ICON = {
              'success':   '✅',
              'failure':   '❌',
              'cancelled': '🚫',
              'skipped':   '⏭️',
          }

          W     = 60
          start = time.time()

          while True:
              jobs    = get_encode_jobs()
              elapsed = time.time() - start

              done    = sum(1 for j in jobs.values() if j.get('status') == 'completed')
              active  = [j for j in jobs.values() if j.get('status') == 'in_progress']
              waiting = total - len(jobs)   # runners not yet assigned

              # Overall progress: treat each completed job as 100%, active as 50%
              pct_total = ((done * 100 + len(active) * 50) / total) if total else 0

              print('━' * W)
              print(f"  📊 MATRIX ENCODE PROGRESS   [{hms(elapsed)} elapsed]")
              print('━' * W)
              print(f"  Chunks  : {done}/{total} done"
                    + (f"  ({len(active)} encoding)" if active else "")
                    + (f"  ({waiting} waiting for runner)" if waiting else ""))
              print(f"  Overall : {bar(pct_total)}  {pct_total:.0f}%")
              print('━' * W)

              for i, part in enumerate(parts):
                  j   = jobs.get(part)
                  idx = f"[{i:02d}]"
                  if j is None:
                      print(f"  {idx} ⏳ waiting for runner…")
                  else:
                      status     = j.get('status', '')
                      conclusion = j.get('conclusion', '')
                      dur        = job_duration(j)
                      if status == 'completed':
                          icon = CONCLUSION_ICON.get(conclusion, '❓')
                          print(f"  {idx} {icon}  {hms(dur)}")
                      elif status == 'in_progress':
                          print(f"  {idx} 🔄  {hms(dur)} elapsed")
                      else:
                          print(f"  {idx} ⏳ queued")

              print('━' * W, flush=True)

              if done == total and total > 0:
                  print(f"\n✅ All {total} chunks finished.")
                  break

              time.sleep(30)

  merge-video:
    needs: [split-video, encode-parts]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-jellyfin-ffmpeg7-${{ runner.os }}

      - name: Install ffmpeg
        run: |
          curl -fsSL https://repo.jellyfin.org/jellyfin_team.gpg.key \
            | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/jellyfin.gpg
          echo "deb [arch=amd64] https://repo.jellyfin.org/ubuntu noble main" \
            | sudo tee /etc/apt/sources.list.d/jellyfin.list
          sudo apt-get update
          sudo apt-get install -y jellyfin-ffmpeg7
          echo "/usr/lib/jellyfin-ffmpeg" >> $GITHUB_PATH

      - name: Verify ffmpeg
        run: ffmpeg -version

      - name: Download All
        uses: actions/download-artifact@v4
        with:
          path: encoded-parts
          pattern: encoded-*
          merge-multiple: true

      - name: Verify chunk count
        run: |
          EXPECTED="${{ needs.split-video.outputs.chunk_count }}"
          ACTUAL=$(find encoded-parts -name "*-encoded.mkv" | wc -l)
          echo "Expected ${EXPECTED} chunks, found ${ACTUAL}"
          if [ "$ACTUAL" -ne "$EXPECTED" ]; then
            echo "ERROR: Chunk count mismatch — one or more encode jobs likely failed"
            exit 1
          fi

      - name: Merge
        run: |
          find encoded-parts -name "*-encoded.mkv" | sort | \
            sed "s/^/file '/;s/$/'/" > list.txt
          cat list.txt
          OUTPUT_NAME="${{ github.event.inputs.output_name }}"
          ffmpeg -f concat -safe 0 -i list.txt -c copy "${OUTPUT_NAME}.mkv"

      - name: Summary
        run: |
          OUTPUT_NAME="${{ github.event.inputs.output_name }}"
          FINAL=$(stat -c%s "${OUTPUT_NAME}.mkv")
          echo "### ✅ Encode Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Output:** \`${OUTPUT_NAME}.mkv\`" >> $GITHUB_STEP_SUMMARY
          echo "- **CRF:** ${{ github.event.inputs.crf }} | **Preset:** ${{ github.event.inputs.preset }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Output size:** $(numfmt --to=iec $FINAL)" >> $GITHUB_STEP_SUMMARY
          echo "- **Chunks merged:** ${{ needs.split-video.outputs.chunk_count }}" >> $GITHUB_STEP_SUMMARY

      - name: Final Upload
        uses: actions/upload-artifact@v4
        with:
          name: final-result
          path: "${{ github.event.inputs.output_name }}.mkv"

  cleanup:
    needs: merge-video
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Delete intermediate artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts \
            --paginate --jq '.artifacts[] | select(.name != "final-result") | .id' | \
            xargs -I{} gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/{}
          echo "Intermediate artifacts deleted."
