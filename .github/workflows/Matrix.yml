name: Matrix AV1 Encoder (Corrected)
on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Direct Link to 2GB Video'
        required: true

jobs:
  split-video:
    runs-on: ubuntu-latest
    outputs:
      matrix_json: ${{ steps.set-matrix.outputs.matrix_json }}
    steps:
      - name: Free Disk Space
        run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
      - name: Download
        run: curl -L "${{ github.event.inputs.video_url }}" -o source.mp4
      - name: Slice
        run: |
          # Split into 6-minute segments
          ffmpeg -i source.mp4 -c copy -map 0 -segment_time 00:06:00 -f segment "part_%02d.mp4"
      - id: set-matrix
        run: |
          # Creates a valid JSON array of filenames for the matrix
          FILES=$(ls part_*.mp4 | jq -R -s -c 'split("\n")[:-1]')
          echo "matrix_json=$FILES" >> $GITHUB_OUTPUT
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: raw-chunks
          path: part_*.mp4
          retention-days: 1

  encode-parts:
    needs: split-video
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # This now correctly references the JSON array from the split job
        part: ${{ fromJson(needs.split-video.outputs.matrix_json) }}
    steps:
      - name: Download Chunk
        uses: actions/download-artifact@v4
        with:
          name: raw-chunks
      - name: Encode (Preset 4, CRF 50)
        run: |
          # 2 cores = 2 threads. Preset 4 is the heavy lifter here.
          ffmpeg -i "${{ matrix.part }}" \
            -c:v libsvtav1 -preset 4 -crf 50 \
            -svtav1-params tune=0:enable-overlays=1:tile-columns=1 \
            -c:a libopus -b:a 128k -threads 2 \
            "${{ matrix.part }}.mkv"
      - name: Upload Encoded
        uses: actions/upload-artifact@v4
        with:
          name: encoded-${{ matrix.part }}
          path: "${{ matrix.part }}.mkv"
          retention-days: 1

  merge-video:
    needs: encode-parts
    runs-on: ubuntu-latest
    steps:
      - name: Download All
        uses: actions/download-artifact@v4
      - name: Merge
        run: |
          # Find all mkv files across the downloaded artifact folders
          find . -name "part_*.mkv" | sort | sed "s/^/file '/;s/$/'/" > list.txt
          ffmpeg -f concat -safe 0 -i list.txt -c copy final_mini_encode.mkv
      - name: Final Upload
        uses: actions/upload-artifact@v4
        with:
          name: final-result
          path: final_mini_encode.mkv
          
