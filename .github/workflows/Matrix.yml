name: Matrix AV1 Encoder (Fixed)
on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Direct Link to 2GB Video'
        required: true

jobs:
  split-video:
    runs-on: ubuntu-latest
    outputs:
      matrix_json: ${{ steps.set-matrix.outputs.matrix_json }}
    steps:
      - name: Download
        run: curl -L "${{ github.event.inputs.video_url }}" -o source.mp4

      - name: Slice
        run: |
          ffmpeg -i source.mp4 -c copy -map 0 \
            -segment_time 00:06:00 -f segment "part_%02d.mp4"

      - id: set-matrix
        run: |
          FILES=$(ls part_*.mp4 | jq -R -s -c 'split("\n")[:-1]')
          echo "matrix_json=$FILES" >> $GITHUB_OUTPUT

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: raw-chunks
          path: part_*.mp4
          retention-days: 1

  encode-parts:
    needs: split-video
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        part: ${{ fromJson(needs.split-video.outputs.matrix_json) }}
    steps:
      - name: Download Chunk
        uses: actions/download-artifact@v4
        with:
          name: raw-chunks

      - name: Encode (Preset 4, CRF 50)
        run: |
          # Strip .mp4 extension for a clean output name
          OUTNAME="${{ matrix.part }}"
          OUTNAME="${OUTNAME%.mp4}.mkv"
          ffmpeg -i "${{ matrix.part }}" \
            -c:v libsvtav1 -preset 4 -crf 50 \
            -svtav1-params tune=0:enable-overlays=1:tile-columns=1 \
            -c:a libopus -b:a 128k -threads 2 \
            "$OUTNAME"

      # FIX: artifact name used a dot-containing filename; use matrix index instead
      - name: Upload Encoded
        uses: actions/upload-artifact@v4
        with:
          name: encoded-${{ strategy.job-index }}
          path: "*.mkv"
          retention-days: 1

  merge-video:
    needs: encode-parts
    runs-on: ubuntu-latest
    steps:
      - name: Download All
        uses: actions/download-artifact@v4
        with:
          # FIX: merge into a flat directory so find works predictably
          path: encoded-parts
          pattern: encoded-*
          merge-multiple: true

      - name: Merge
        run: |
          # FIX: pattern matches clean *.mkv names, sorted correctly
          find encoded-parts -name "*.mkv" | sort | \
            sed "s/^/file '/;s/$/'/" > list.txt
          cat list.txt  # log for debugging
          ffmpeg -f concat -safe 0 -i list.txt -c copy final_mini_encode.mkv

      - name: Final Upload
        uses: actions/upload-artifact@v4
        with:
          name: final-result
          path: final_mini_encode.mkv
