name: Matrix AV1 Encoder
on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Direct Link to Video (MKV/MP4)'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  split-video:
    runs-on: ubuntu-latest
    outputs:
      matrix_json: ${{ steps.set-matrix.outputs.matrix_json }}
    steps:
      - name: Cache apt packages
        uses: actions/cache@v5
        with:
          path: /var/cache/apt/archives
          key: apt-jellyfin-ffmpeg7-${{ runner.os }}

      - name: Install ffmpeg
        run: |
          curl -fsSL https://repo.jellyfin.org/jellyfin_team.gpg.key \
            | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/jellyfin.gpg
          echo "deb [arch=amd64] https://repo.jellyfin.org/ubuntu noble main" \
            | sudo tee /etc/apt/sources.list.d/jellyfin.list
          sudo apt-get update
          sudo apt-get install -y jellyfin-ffmpeg7
          echo "/usr/lib/jellyfin-ffmpeg" >> $GITHUB_PATH

      - name: Verify ffmpeg + svtav1
        run: ffmpeg -encoders 2>/dev/null | grep svtav1

      - name: Download
        run: |
          # --fail: error on HTTP failures
          # --retry 3: retry on transient errors
          # --location: follow redirects
          # URL is passed via env var to avoid shell interpretation of special chars
          curl --fail --retry 3 --location --globoff \
            --output source.mkv \
            --progress-bar \
            "$VIDEO_URL"

          # Verify file is not empty and looks like a valid MKV/media file
          SIZE=$(stat -c%s source.mkv)
          echo "Downloaded: ${SIZE} bytes"
          if [ "$SIZE" -lt 1000000 ]; then
            echo "ERROR: File too small, download likely failed"
            exit 1
          fi

          # Check file magic bytes (MKV starts with 0x1A45DFA3)
          MAGIC=$(xxd -p -l 4 source.mkv)
          echo "File magic: $MAGIC"
          if [ "$MAGIC" != "1a45dfa3" ]; then
            echo "WARNING: File does not appear to be MKV, may be HTML error page"
            head -c 500 source.mkv
            exit 1
          fi
        env:
          VIDEO_URL: ${{ github.event.inputs.video_url }}

      - name: Slice (12 equal chunks)
        run: |
          DURATION=$(ffprobe -v error \
            -analyzeduration 100M -probesize 100M \
            -show_entries format=duration \
            -of default=noprint_wrappers=1:nokey=1 \
            source.mkv)

          CHUNK=$(echo "$DURATION / 12" | bc)
          echo "Video duration: ${DURATION}s — chunk size: ${CHUNK}s"

          ffmpeg \
            -analyzeduration 100M -probesize 100M \
            -i source.mkv \
            -map 0:v -map 0:a -map 0:s? \
            -c copy \
            -segment_time "$CHUNK" \
            -f segment \
            -segment_format matroska \
            "part_%02d.mkv"

          echo "Chunks created:"
          ls -lh part_*.mkv

      - id: set-matrix
        run: |
          FILES=$(ls part_*.mkv | jq -R -s -c 'split("\n")[:-1]')
          echo "matrix_json=$FILES" >> $GITHUB_OUTPUT

      - name: Upload Chunks
        uses: actions/upload-artifact@v5
        with:
          name: raw-chunks
          path: part_*.mkv
          retention-days: 1

  encode-parts:
    needs: split-video
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        part: ${{ fromJson(needs.split-video.outputs.matrix_json) }}
    steps:
      - name: Cache apt packages
        uses: actions/cache@v5
        with:
          path: /var/cache/apt/archives
          key: apt-jellyfin-ffmpeg7-${{ runner.os }}

      - name: Install ffmpeg
        run: |
          curl -fsSL https://repo.jellyfin.org/jellyfin_team.gpg.key \
            | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/jellyfin.gpg
          echo "deb [arch=amd64] https://repo.jellyfin.org/ubuntu noble main" \
            | sudo tee /etc/apt/sources.list.d/jellyfin.list
          sudo apt-get update
          sudo apt-get install -y jellyfin-ffmpeg7
          echo "/usr/lib/jellyfin-ffmpeg" >> $GITHUB_PATH

      - name: Verify ffmpeg + svtav1
        run: ffmpeg -encoders 2>/dev/null | grep svtav1

      - name: Download Chunk
        uses: actions/download-artifact@v5
        with:
          name: raw-chunks

      - name: Encode (Preset 4, CRF 50)
        run: |
          OUTNAME="${{ matrix.part }}"
          OUTNAME="${OUTNAME%.mkv}-encoded.mkv"
          ffmpeg \
            -analyzeduration 100M -probesize 100M \
            -i "${{ matrix.part }}" \
            -map 0:v -map 0:a -map 0:s? \
            -c:v libsvtav1 -preset 4 -crf 50 \
            -svtav1-params tune=0:enable-overlays=1:tile-columns=1 \
            -c:a libopus -b:a 128k \
            -c:s copy \
            -threads 2 \
            "$OUTNAME"

      - name: Upload Encoded
        uses: actions/upload-artifact@v5
        with:
          name: encoded-${{ strategy.job-index }}
          path: "*-encoded.mkv"
          retention-days: 1

  merge-video:
    needs: encode-parts
    runs-on: ubuntu-latest
    steps:
      - name: Cache apt packages
        uses: actions/cache@v5
        with:
          path: /var/cache/apt/archives
          key: apt-jellyfin-ffmpeg7-${{ runner.os }}

      - name: Install ffmpeg
        run: |
          curl -fsSL https://repo.jellyfin.org/jellyfin_team.gpg.key \
            | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/jellyfin.gpg
          echo "deb [arch=amd64] https://repo.jellyfin.org/ubuntu noble main" \
            | sudo tee /etc/apt/sources.list.d/jellyfin.list
          sudo apt-get update
          sudo apt-get install -y jellyfin-ffmpeg7
          echo "/usr/lib/jellyfin-ffmpeg" >> $GITHUB_PATH

      - name: Verify ffmpeg
        run: ffmpeg -version

      - name: Download All
        uses: actions/download-artifact@v5
        with:
          path: encoded-parts
          pattern: encoded-*
          merge-multiple: true

      - name: Merge
        run: |
          find encoded-parts -name "*-encoded.mkv" | sort | \
            sed "s/^/file '/;s/$/'/" > list.txt
          cat list.txt
          ffmpeg -f concat -safe 0 -i list.txt -c copy final_mini_encode.mkv

      - name: Final Upload
        uses: actions/upload-artifact@v5
        with:
          name: final-result
          path: final_mini_encode.mkv
