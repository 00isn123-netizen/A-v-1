name: Matrix AV1 Encoder
on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Direct Link to Video (MKV/MP4)'
        required: true

jobs:
  split-video:
    runs-on: ubuntu-latest
    outputs:
      matrix_json: ${{ steps.set-matrix.outputs.matrix_json }}
    steps:
      - name: Cache ffmpeg (Jellyfin)
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: /usr/lib/jellyfin-ffmpeg
          key: jellyfin-ffmpeg7-ubuntu-24

      - name: Install ffmpeg (if not cached)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://repo.jellyfin.org/jellyfin_team.gpg.key \
            | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/jellyfin.gpg
          echo "deb [arch=amd64] https://repo.jellyfin.org/ubuntu noble main" \
            | sudo tee /etc/apt/sources.list.d/jellyfin.list
          sudo apt-get update
          sudo apt-get install -y jellyfin-ffmpeg7

      - name: Add ffmpeg to PATH
        run: echo "/usr/lib/jellyfin-ffmpeg" >> $GITHUB_PATH

      - name: Verify ffmpeg + svtav1
        run: ffmpeg -encoders 2>/dev/null | grep svtav1

      - name: Download
        run: curl -L "${{ github.event.inputs.video_url }}" -o source.mkv

      - name: Slice (4 equal chunks)
        run: |
          # Get duration in seconds (float)
          DURATION=$(ffprobe -v error \
            -analyzeduration 100M -probesize 100M \
            -show_entries format=duration \
            -of default=noprint_wrappers=1:nokey=1 \
            source.mkv)

          # Calculate 25% of duration, rounded to nearest second
          CHUNK=$(echo "$DURATION / 4" | bc)
          echo "Video duration: ${DURATION}s — chunk size: ${CHUNK}s"

          ffmpeg \
            -analyzeduration 100M -probesize 100M \
            -i source.mkv \
            -map 0:v -map 0:a -map 0:s? \
            -c copy \
            -segment_time "$CHUNK" \
            -f segment \
            -segment_format matroska \
            "part_%02d.mkv"

          echo "Chunks created:"
          ls -lh part_*.mkv

      - id: set-matrix
        run: |
          FILES=$(ls part_*.mkv | jq -R -s -c 'split("\n")[:-1]')
          echo "matrix_json=$FILES" >> $GITHUB_OUTPUT

      - name: Upload Chunks
        uses: actions/upload-artifact@v4
        with:
          name: raw-chunks
          path: part_*.mkv
          retention-days: 1

  encode-parts:
    needs: split-video
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        part: ${{ fromJson(needs.split-video.outputs.matrix_json) }}
    steps:
      - name: Cache ffmpeg (Jellyfin)
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: /usr/lib/jellyfin-ffmpeg
          key: jellyfin-ffmpeg7-ubuntu-24

      - name: Install ffmpeg (if not cached)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://repo.jellyfin.org/jellyfin_team.gpg.key \
            | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/jellyfin.gpg
          echo "deb [arch=amd64] https://repo.jellyfin.org/ubuntu noble main" \
            | sudo tee /etc/apt/sources.list.d/jellyfin.list
          sudo apt-get update
          sudo apt-get install -y jellyfin-ffmpeg7

      - name: Add ffmpeg to PATH
        run: echo "/usr/lib/jellyfin-ffmpeg" >> $GITHUB_PATH

      - name: Verify ffmpeg + svtav1
        run: ffmpeg -encoders 2>/dev/null | grep svtav1

      - name: Download Chunk
        uses: actions/download-artifact@v4
        with:
          name: raw-chunks

      - name: Encode (Preset 4, CRF 50)
        run: |
          OUTNAME="${{ matrix.part }}"
          OUTNAME="${OUTNAME%.mkv}-encoded.mkv"
          ffmpeg \
            -analyzeduration 100M -probesize 100M \
            -i "${{ matrix.part }}" \
            -map 0:v -map 0:a -map 0:s? \
            -c:v libsvtav1 -preset 4 -crf 50 \
            -svtav1-params tune=0:enable-overlays=1:tile-columns=1 \
            -c:a libopus -b:a 128k \
            -c:s copy \
            -threads 2 \
            "$OUTNAME"

      - name: Upload Encoded
        uses: actions/upload-artifact@v4
        with:
          name: encoded-${{ strategy.job-index }}
          path: "*-encoded.mkv"
          retention-days: 1

  merge-video:
    needs: encode-parts
    runs-on: ubuntu-latest
    steps:
      - name: Cache ffmpeg (Jellyfin)
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: /usr/lib/jellyfin-ffmpeg
          key: jellyfin-ffmpeg7-ubuntu-24

      - name: Install ffmpeg (if not cached)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://repo.jellyfin.org/jellyfin_team.gpg.key \
            | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/jellyfin.gpg
          echo "deb [arch=amd64] https://repo.jellyfin.org/ubuntu noble main" \
            | sudo tee /etc/apt/sources.list.d/jellyfin.list
          sudo apt-get update
          sudo apt-get install -y jellyfin-ffmpeg7

      - name: Add ffmpeg to PATH
        run: echo "/usr/lib/jellyfin-ffmpeg" >> $GITHUB_PATH

      - name: Verify ffmpeg
        run: ffmpeg -version

      - name: Download All
        uses: actions/download-artifact@v4
        with:
          path: encoded-parts
          pattern: encoded-*
          merge-multiple: true

      - name: Merge
        run: |
          find encoded-parts -name "*-encoded.mkv" | sort | \
            sed "s/^/file '/;s/$/'/" > list.txt
          cat list.txt
          ffmpeg -f concat -safe 0 -i list.txt -c copy final_mini_encode.mkv

      - name: Final Upload
        uses: actions/upload-artifact@v4
        with:
          name: final-result
          path: final_mini_encode.mkv
