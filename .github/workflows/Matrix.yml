name: Matrix AV1 Encoder
on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Direct Link to Video (MKV/MP4)'
        required: true

jobs:
  split-video:
    runs-on: ubuntu-latest
    outputs:
      matrix_json: ${{ steps.set-matrix.outputs.matrix_json }}
    steps:
      - name: Cache ffmpeg
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/bin/ffmpeg
            /usr/local/bin/ffprobe
          key: ffmpeg-static-amd64

      - name: Install ffmpeg (if not cached)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          curl -sL https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz \
            | tar -xJ --wildcards --strip-components=1 '*/ffmpeg' '*/ffprobe'
          sudo mv ffmpeg ffprobe /usr/local/bin/

      - name: Verify ffmpeg
        run: ffmpeg -version

      - name: Download
        run: curl -L "${{ github.event.inputs.video_url }}" -o source.mkv

      - name: Slice
        run: |
          ffmpeg \
            -analyzeduration 100M -probesize 100M \
            -i source.mkv \
            -map 0:v -map 0:a -map 0:s? \
            -c copy \
            -segment_time 00:06:00 \
            -f segment \
            -segment_format matroska \
            "part_%02d.mkv"

      - id: set-matrix
        run: |
          FILES=$(ls part_*.mkv | jq -R -s -c 'split("\n")[:-1]')
          echo "matrix_json=$FILES" >> $GITHUB_OUTPUT

      - name: Upload Chunks
        uses: actions/upload-artifact@v4
        with:
          name: raw-chunks
          path: part_*.mkv
          retention-days: 1

  encode-parts:
    needs: split-video
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        part: ${{ fromJson(needs.split-video.outputs.matrix_json) }}
    steps:
      - name: Cache ffmpeg
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/bin/ffmpeg
            /usr/local/bin/ffprobe
          key: ffmpeg-static-amd64

      - name: Install ffmpeg (if not cached)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          curl -sL https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz \
            | tar -xJ --wildcards --strip-components=1 '*/ffmpeg' '*/ffprobe'
          sudo mv ffmpeg ffprobe /usr/local/bin/

      - name: Verify ffmpeg
        run: ffmpeg -version

      - name: Download Chunk
        uses: actions/download-artifact@v4
        with:
          name: raw-chunks

      - name: Encode (Preset 4, CRF 50)
        run: |
          OUTNAME="${{ matrix.part }}"
          OUTNAME="${OUTNAME%.mkv}-encoded.mkv"
          ffmpeg \
            -analyzeduration 100M -probesize 100M \
            -i "${{ matrix.part }}" \
            -map 0:v -map 0:a -map 0:s? \
            -c:v libsvtav1 -preset 4 -crf 50 \
            -svtav1-params tune=0:enable-overlays=1:tile-columns=1 \
            -c:a libopus -b:a 128k \
            -c:s copy \
            -threads 2 \
            "$OUTNAME"

      - name: Upload Encoded
        uses: actions/upload-artifact@v4
        with:
          name: encoded-${{ strategy.job-index }}
          path: "*-encoded.mkv"
          retention-days: 1

  merge-video:
    needs: encode-parts
    runs-on: ubuntu-latest
    steps:
      - name: Cache ffmpeg
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/bin/ffmpeg
            /usr/local/bin/ffprobe
          key: ffmpeg-static-amd64

      - name: Install ffmpeg (if not cached)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          curl -sL https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz \
            | tar -xJ --wildcards --strip-components=1 '*/ffmpeg' '*/ffprobe'
          sudo mv ffmpeg ffprobe /usr/local/bin/

      - name: Verify ffmpeg
        run: ffmpeg -version

      - name: Download All
        uses: actions/download-artifact@v4
        with:
          path: encoded-parts
          pattern: encoded-*
          merge-multiple: true

      - name: Merge
        run: |
          find encoded-parts -name "*-encoded.mkv" | sort | \
            sed "s/^/file '/;s/$/'/" > list.txt
          cat list.txt
          ffmpeg -f concat -safe 0 -i list.txt -c copy final_mini_encode.mkv

      - name: Final Upload
        uses: actions/upload-artifact@v4
        with:
          name: final-result
          path: final_mini_encode.mkv
